<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — ETER VANGUARDS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --page-bg: radial-gradient(circle at top, #1a1a2e, #0a0a0f 62%);
  --text-color: #ffffff;
  --muted-text: #cfcfe6;
  --card-bg: rgba(255,255,255,0.04);
  --card-bg-strong: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.08);
  --card-border-strong: rgba(255,255,255,0.14);
  --surface-muted: #222222;
  --shadow-color: rgba(255,70,85,0.25);
  --accent: #ff4655;
  --accent-soft: #ff7a85;
  --menu-bg: rgba(15,15,20,0.95);
  --toggle-bg: rgba(255,255,255,0.08);
  --toggle-border: rgba(255,255,255,0.14);
  --toggle-text: #ffffff;
  --toggle-shadow: 0 20px 45px rgba(0,0,0,0.28);
}
body.light-theme {
  --page-bg: radial-gradient(circle at top left, rgba(255,157,167,0.35), transparent 36%), radial-gradient(circle at top right, rgba(129,198,255,0.28), transparent 30%), linear-gradient(180deg, #f8f4f1 0%, #eef3fb 48%, #e9eef7 100%);
  --text-color: #172033;
  --muted-text: #5d6880;
  --card-bg: rgba(255,255,255,0.72);
  --card-bg-strong: rgba(255,255,255,0.86);
  --card-border: rgba(133,152,196,0.22);
  --card-border-strong: rgba(102,122,168,0.28);
  --surface-muted: #dbe4f1;
  --shadow-color: rgba(255,88,110,0.18);
  --menu-bg: rgba(255,255,255,0.92);
  --toggle-bg: rgba(255,255,255,0.88);
  --toggle-border: rgba(111,132,173,0.24);
  --toggle-text: #182036;
  --toggle-shadow: 0 20px 45px rgba(109,127,164,0.18);
}
html, body {
  margin: 0; padding: 0; min-height: 100%;
  font-family: 'Poppins', sans-serif;
  background: var(--page-bg);
  color: var(--text-color);
  transition: background 0.45s ease, color 0.35s ease;
  overflow-x: hidden;
}
html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; }
html { scrollbar-width: none; -ms-overflow-style: none; }

.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  padding: 22px 24px;
  border: 1px solid var(--card-border);
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)), radial-gradient(circle at top, rgba(255,70,85,0.14), transparent 58%);
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 65px rgba(10,13,24,0.16);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border: 1px solid var(--card-border);
  border-radius: 999px;
  background: var(--card-bg);
  color: var(--text-color);
  text-decoration: none;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
}
.back-btn:hover {
  transform: translateY(-2px);
  border-color: rgba(255,70,85,0.3);
  background: rgba(255,70,85,0.08);
}
.title {
  font-size: clamp(28px, 4vw, 42px);
  background: linear-gradient(45deg, var(--accent), var(--accent-soft));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.18em;
  font-weight: 700;
  text-transform: uppercase;
}
.profile-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 28px;
  padding: 48px 40px;
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 60px rgba(10,13,24,0.18);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  text-align: center;
}
.profile-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  font-weight: 700;
  color: #fff;
  box-shadow: 0 16px 40px rgba(255,70,85,0.3);
  letter-spacing: 1px;
}
.profile-name {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.profile-sub {
  font-size: 13px;
  color: var(--muted-text);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: -16px;
}
.profile-divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  border-radius: 2px;
  opacity: 0.5;
}
.profile-coming-soon {
  font-size: 15px;
  color: var(--muted-text);
  line-height: 1.6;
  max-width: 400px;
}
.control-panel {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 999px;
  border: 1px solid var(--toggle-border);
  background: var(--toggle-bg);
  backdrop-filter: blur(18px);
  box-shadow: var(--toggle-shadow);
  z-index: 2200;
}
.control-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 46px;
  padding: 10px 14px;
  border: 1px solid transparent;
  border-radius: 999px;
  background: transparent;
  color: var(--toggle-text);
  cursor: pointer;
  font: inherit;
  font-weight: 600;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.35s ease, border-color 0.35s ease;
}
.control-action:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.08);
  border-color: var(--toggle-border);
}
.theme-toggle-indicator {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-soft), var(--accent));
  box-shadow: inset 0 2px 8px rgba(255,255,255,0.24);
  flex-shrink: 0;
}
body.light-theme .theme-toggle-indicator {
  background: linear-gradient(135deg, #fff3b0, #ffb347);
}
.theme-toggle-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
.theme-toggle-label { font-size: 11px; opacity: 0.7; }
.theme-toggle-value { font-size: 13px; }

@media (max-width: 640px) {
  .control-panel { left: 14px; right: 14px; bottom: 14px; justify-content: space-between; }
  .profile-card { padding: 32px 20px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← Wróć</a>
      <div class="title">Profil</div>
    </div>
  </div>

  <div class="profile-card" id="profileCard">
    <div class="profile-avatar" id="profileAvatar">?</div>
    <div class="profile-name" id="profileName">Ładowanie...</div>
    <div class="profile-sub">ETER VANGUARDS</div>
    <div class="profile-divider"></div>
    <div class="profile-coming-soon">Strona profilu jest w budowie.<br>Wróć tu wkrótce — będzie tu więcej! 🔥</div>
  </div>
</div>

<div class="control-panel">
  <button class="control-action theme-toggle" id="themeToggle" type="button">
    <span class="theme-toggle-indicator"></span>
    <span class="theme-toggle-text">
      <span class="theme-toggle-label">Motyw</span>
      <span class="theme-toggle-value" id="themeToggleValue">Ciemny</span>
    </span>
  </button>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const supabase = createClient(
    'https://zllishknfqylpommgnew.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsbGlzaGtuZnF5bHBvbW1nbmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk4MDksImV4cCI6MjA5MDk3NTgwOX0.Tm7ZGifcT5Y2kBJxaTUK_ASQruVcpHrM9UDMtmQiT4A'
  );

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    const { data: profile } = await supabase
      .from('profiles')
      .select('username')
      .eq('id', session.user.id)
      .single();

    const username = profile?.username || session.user.email;
    document.getElementById('profileName').textContent = username;
    document.getElementById('profileAvatar').textContent = username.charAt(0).toUpperCase();
  }

  init();

  // Theme
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleValue = document.getElementById('themeToggleValue');
  function applyTheme(theme) {
    const isLight = theme === 'light';
    document.body.classList.toggle('light-theme', isLight);
    themeToggleValue.textContent = isLight ? 'Jasny' : 'Ciemny';
    localStorage.setItem('eter-theme', isLight ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('eter-theme') === 'light' ? 'light' : 'dark');
  themeToggle.addEventListener('click', () => {
    applyTheme(document.body.classList.contains('light-theme') ? 'dark' : 'light');
  });
</script>
</body>
</html>
